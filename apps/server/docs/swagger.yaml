    - optionLabel
    - ordering
    type: object
  github_com_giridhar-m-a_custom_form_app_internal_dto.CreateFormFieldsDTO:
    properties:
      formFields:
        items:
          $ref: '#/definitions/github_com_giridhar-m-a_custom_form_app_internal_dto.CreateFormFieldDTO'
        type: array
      formId:
        type: string
    required:
    - formFields
    - formId
    type: object
  github_com_giridhar-m-a_custom_form_app_internal_dto.CreatedFormFieldDTO:
    properties:
      fieldId:
        type: string
      fieldLabel:
        type: string
      fieldType:
        $ref: '#/definitions/github_com_giridhar-m-a_custom_form_app_internal_db_sqlc.FormFieldType'
      formId:
        type: string
      isRequired:
        $ref: '#/definitions/sql.NullBool'
      options:
        items:
          $ref: '#/definitions/github_com_giridhar-m-a_custom_form_app_internal_dto.CreatedFormFieldOptionDTO'
        type: array
      ordering:
        type: integer
    type: object
  github_com_giridhar-m-a_custom_form_app_internal_dto.CreatedFormFieldOptionDTO:
    properties:
      fieldId:
        $ref: '#/definitions/uuid.NullUUID'
      isAnswer:
        $ref: '#/definitions/sql.NullBool'
      optionId:
        type: string
      optionLabel:
        type: string
      ordering:
        type: integer
    type: object
  github_com_giridhar-m-a_custom_form_app_internal_dto.EmailPasswordAuthRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  github_com_giridhar-m-a_custom_form_app_internal_dto.FormResponse:
    properties:
      access:
        type: string
      createdAt:
        type: string
      createdBy:
