basePath: /api/v1
definitions:
  github_com_giridhar-m-a_custom_form_app_internal_db_sqlc.FormFieldType:
    enum:
    - text
    - number
    - date
    - time
    - datetime
    - email
    - phone
    - url
    - file
    - image
    - video
    - audio
    - checkbox
    - radio
    - dropdown
    - multiselect
    - rating
    - slider
    - color
    - textArea
    type: string
    x-enum-varnames:
    - FormFieldTypeText
