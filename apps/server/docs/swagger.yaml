host: localhost:8000
info:
  contact:
    email: m.a.giridhar08@gmail.com
    name: API Support
    url: http://giridhar.dev/
  description: Backend API for Custom Form Application
  title: My API
  version: "1.0"
paths:
  /auth/google:
    get:
      consumes:
      - application/json
      description: Redirects user to Google OAuth consent screen for authentication
      parameters:
      - description: Authorization code from Google OAuth
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Authentication successful
          schema:
            properties:
              data:
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    properties:
                      createdAt:
                        type: string
                      email:
                        type: string
                      fullName:
                        type: string
                      id:
                        type: string
                      profilePic:
                        type: string
                      profilePicId:
                        type: string
                      updatedAt:
                        type: string
                    type: object
                type: object
              message:
                type: string
              status:
                type: integer
            type: object
        "400":
          description: Bad request
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
      summary: Initiate Google OAuth authentication
      tags:
      - Authentication
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access & refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_giridhar-m-a_custom_form_app_internal_dto.EmailPasswordAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            properties:
              data:
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    properties:
                      createdAt:
                        type: string
                      email:
                        type: string
                      fullName:
                        type: string
                      id:
                        type: string
                      profilePic:
                        type: string
                      profilePicId:
                        type: string
                      updatedAt:
                        type: string
                    type: object
                type: object
              message:
                type: string
              status:
                type: integer
            type: object
        "400":
          description: Invalid credentials
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
      summary: Login with email and password
      tags:
      - Authentication
  /auth/register:
    post:
      consumes:
      - application/json
      description: Registers a user with name, email, and password
      parameters:
      - description: User registration payload
        in: body
        name: form
        required: true
        schema:
          $ref: '#/definitions/github_com_giridhar-m-a_custom_form_app_internal_dto.EmailPasswordRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Authentication successful
          schema:
            properties:
              data:
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    properties:
                      createdAt:
                        type: string
                      email:
                        type: string
                      fullName:
                        type: string
                      id:
                        type: string
                      profilePic:
                        type: string
                      profilePicId:
                        type: string
                      updatedAt:
                        type: string
                    type: object
                type: object
              message:
                type: string
              status:
                type: integer
            type: object
        "400":
          description: Invalid request
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "409":
          description: Email already exists
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
      summary: Register a new user
      tags:
      - Authentication
  /auth/verify:
    get:
      consumes:
      - application/json
      description: Verifies the access token and returns the user ID
      parameters:
      - description: Access token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Token verification successful
          schema:
            properties:
              data:
                properties:
                  userID:
                    type: string
                type: object
              message:
                type: string
              status:
                type: integer
            type: object
        "400":
          description: Invalid request
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
      summary: Verify Access Token
      tags:
      - Authentication
  /auth/verify-refresh-token:
    get:
      consumes:
      - application/json
      description: Verifies the access token and returns the user ID
      parameters:
      - description: Refresh token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Token verification successful
          schema:
            properties:
              data:
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                type: object
              message:
                type: string
              status:
                type: integer
            type: object
        "400":
          description: Invalid request
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
      summary: Verify Access Token
      tags:
      - Authentication
  /file-upload:
    post:
      consumes:
      - multipart/form-data
      description: Uploads a file to the specified MinIO bucket and returns file info
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upload a file to MinIO
      tags:
      - Files
  /forms:
    get:
      consumes:
      - application/json
      description: Gets forms for the authenticated user
      parameters:
      - in: query
        name: access
        type: string
      - in: query
        name: limit
        type: integer
      - in: query
        name: page
        type: integer
      - in: query
        name: search
        type: string
      - in: query
        name: sort
        type: string
      - in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Forms retrieved successfully
          schema:
            properties:
              ' pagination':
                properties:
                  ' limit':
                    type: integer
                  ' page':
                    type: integer
                  ' totalPages':
                    type: integer
                  totalRecords:
                    type: integer
                type: object
              data:
                items:
                  $ref: '#/definitions/github_com_giridhar-m-a_custom_form_app_internal_dto.FormResponse'
                type: array
              message:
                type: string
              status:
                type: string
            type: object
        "400":
          description: Invalid request payload
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              message:
                type: string
              status:
                type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get forms
      tags:
      - Forms
    post:
      consumes:
      - application/json
      description: Creates a new form for the authenticated user
      parameters:
      - description: Form data
        in: body
        name: form
        required: true
        schema:
          $ref: '#/definitions/github_com_giridhar-m-a_custom_form_app_internal_dto.CreateFormDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Form created successfully
          schema:
            properties:
              data:
                $ref: '#/definitions/github_com_giridhar-m-a_custom_form_app_internal_dto.FormResponse'
