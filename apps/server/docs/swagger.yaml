host: be.custom-form-app.home
info:
  contact:
    email: m.a.giridhar08@gmail.com
    name: API Support
    url: http://giridhar.dev/
  description: Backend API for Custom Form Application
  title: My API
  version: "1.0"
paths:
  /auth/google:
    get:
      consumes:
      - application/json
      description: Redirects user to Google OAuth consent screen for authentication
      parameters:
      - description: Authorization code from Google OAuth
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Authentication successful
          schema:
            properties:
              data:
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    properties:
                      createdAt:
                        type: string
                      email:
                        type: string
                      fullName:
                        type: string
                      id:
                        type: string
                      profilePic:
                        type: string
                      profilePicId:
                        type: string
                      updatedAt:
                        type: string
                    type: object
                type: object
              message:
                type: string
              status:
                type: integer
            type: object
        "400":
          description: Bad request
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
      summary: Initiate Google OAuth authentication
      tags:
      - Authentication
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access & refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_giridhar-m-a_custom_form_app_internal_dto.EmailPasswordAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            properties:
              data:
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    properties:
                      createdAt:
                        type: string
                      email:
                        type: string
                      fullName:
                        type: string
                      id:
                        type: string
                      profilePic:
                        type: string
                      profilePicId:
                        type: string
                      updatedAt:
                        type: string
                    type: object
                type: object
              message:
                type: string
              status:
                type: integer
            type: object
        "400":
          description: Invalid credentials
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
      summary: Login with email and password
      tags:
      - Authentication
  /auth/refresh-token:
    get:
      consumes:
      - application/json
      description: Verifies the access token and returns the user ID
      parameters:
      - description: Refresh token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Token verification successful
          schema:
