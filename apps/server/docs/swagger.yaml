        type: string
      id:
        type: string
      status:
        type: string
      title:
        type: string
      updatedAt:
        type: string
    type: object
  sql.NullBool:
    properties:
      bool:
        type: boolean
      valid:
        description: Valid is true if Bool is not NULL
        type: boolean
