    - FormFieldTypeDate
    - FormFieldTypeTime
    - FormFieldTypeDatetime
    - FormFieldTypeEmail
    - FormFieldTypePhone
    - FormFieldTypeUrl
    - FormFieldTypeFile
    - FormFieldTypeImage
    - FormFieldTypeVideo
    - FormFieldTypeAudio
    - FormFieldTypeCheckbox
    - FormFieldTypeRadio
    - FormFieldTypeDropdown
    - FormFieldTypeMultiselect
    - FormFieldTypeRating
    - FormFieldTypeSlider
    - FormFieldTypeColor
    - FormFieldTypeTextArea
  github_com_giridhar-m-a_custom_form_app_internal_dto.CreateFormDTO:
