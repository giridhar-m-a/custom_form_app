services:

  db:
    image: postgres:15
    container_name: custom_form_app_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: custom_form_app_redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: custom_form_app_app
    command: air -c .air.toml
    working_dir: /app
    environment:
      - AIR_WATCHER_FORCE_POLLING=true
    env_file:
      - .env
    volumes:
      - .:/app:delegated
      - air_tmp:/app/tmp
    ports:
      - ${APP_PORT}:${APP_PORT}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  air_tmp:
