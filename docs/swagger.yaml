basePath: /api/v1
host: localhost:8000
info:
  contact:
    email: m.a.giridhar08@gmail.com
    name: API Support
    url: http://giridhar.dev/
  description: Backend API for Custom Form Application
  title: My API
  version: "1.0"
paths:
  /auth/google:
    get:
      consumes:
      - application/json
      description: Redirects user to Google OAuth consent screen for authentication
      parameters:
      - description: Authorization code from Google OAuth
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Authentication successful
          schema:
            properties:
              data:
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    properties:
                      createdAt:
                        type: string
                      email:
                        type: string
                      fullName:
                        type: string
                      id:
                        type: string
                      profilePic:
                        type: string
                      profilePicId:
                        type: string
                      updatedAt:
                        type: string
                    type: object
                type: object
              message:
                type: string
              status:
                type: integer
            type: object
        "400":
          description: Bad request
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
      summary: Initiate Google OAuth authentication
      tags:
      - Authentication
  /file-upload:
    post:
      consumes:
      - multipart/form-data
      description: Uploads a file to the specified MinIO bucket and returns file info
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upload a file to MinIO
      tags:
      - Files
  /forms/{id}:
    get:
      consumes:
      - application/json
      description: Retrieves a form with the specified ID
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Form retrieved successfully
          schema:
            properties:
              formID:
                type: string
              message:
                type: string
            type: object
        "400":
          description: Bad request
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
        "500":
          description: Internal server error
          schema:
            properties:
              message:
                type: string
              status:
                type: integer
            type: object
      security:
      - BearerAuth: []
      summary: Get a form by ID
      tags:
      - Forms
  /health:
    get:
      description: Returns OK if the API is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Check API health
      tags:
      - health
schemes:
- https
- http
securityDefinitions:
  BearerAuth:
    description: JWT Authorization header using the Bearer scheme.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
